<!DOCTYPE html>
<html lang="en" data-theme="light">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>USA State Icons | SVG Icons for 50 states of the USA</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://fonts.googleapis.com/css2?family=Google+Sans+Flex:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <!-- Toast Notification -->
  <div class="toast-container position-fixed top-0 end-0 p-3" style="z-index:9999">
    <div id="copyToast" class="toast align-items-center border-0" role="alert">
      <div class="d-flex">
        <div class="toast-body" id="toastMessage"></div>
        <button type="button" class="btn-close btn-close-white me-2 m-auto" data-bs-dismiss="toast"></button>
      </div>
    </div>
  </div>

  <!-- Header -->
  <header class="site-header">
    <div class="container">
      <div class="header-inner">
        <div class="header-brand d-flex align-items-center">
          <h1 class="header-title p-0 m-0">SVG Icons of All 50 States. </h1>
        </div>
        <!-- Dark/Light mode toggle -->
        <button class="theme-toggle" id="themeToggle" title="Toggle dark mode">
          <!-- Sun icon (shown in dark mode) -->
          <svg class="theme-icon theme-icon--sun" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <circle cx="10" cy="10" r="4"/>
            <path d="M10 2v2M10 16v2M2 10h2M16 10h2M4.93 4.93l1.41 1.41M13.66 13.66l1.41 1.41M4.93 15.07l1.41-1.41M13.66 6.34l1.41-1.41"/>
          </svg>
          <!-- Moon icon (shown in light mode) -->
          <svg class="theme-icon theme-icon--moon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5">
            <path d="M17.293 13.293A8 8 0 016.707 2.707a8.003 8.003 0 1010.586 10.586z"/>
          </svg>
        </button>
      </div>
    </div>
  </header>

  <!-- Controls Bar -->
   <div class="container-fluid" style="background-color: var(--color-header-bg);">
    <div class="container pt-3">
    <div class="row">
      <div class="col">
        <p >Customize colors, stroke, and download in SVG, PNG, or JPG. <strong>Free forever by <a href="https://github.com/nouchee">@nouchee</a></strong></strong></p>
      </div>
    </div>
   </div>
   </div>
  <section class="controls-bar">
    <div class="container">
      <div class="controls-inner">
        <!-- Left side: Search + Sort -->
        <div class="controls-left">
          <div class="search-wrap">
            <svg class="search-icon" viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2">
              <circle cx="8.5" cy="8.5" r="6"/>
              <line x1="13" y1="13" x2="18" y2="18"/>
            </svg>
            <input type="text" class="search-input" id="searchInput" placeholder="Search states…">
          </div>
          <button class="sort-toggle" id="sortToggle" title="Sort A–Z">
            <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="1.5" width="18" height="18">
              <path d="M3 5h14M3 10h10M3 15h6"/>
            </svg>
            <span class="sort-label">A–Z</span>
          </button>
          <div class="grid-size-group">
            <button class="grid-size-btn" data-grid-size="sm">Small</button>
            <button class="grid-size-btn" data-grid-size="md">Medium</button>
            <button class="grid-size-btn active" data-grid-size="lg">Large</button>
          </div>
        </div>

        <!-- Right side: Color Customization -->
        <div class="color-controls">
          <!-- Fill -->
          <div class="control-group">
            <label class="control-label">
              <input type="checkbox" id="fillToggle" class="form-check-input" checked> Fill
            </label>
            <div class="color-picker-wrap" id="fillWrap">
              <input type="text" id="fillHex" class="hex-input" value="#f2f2f2" maxlength="7">
              <input type="color" id="fillColor" value="#f2f2f2" class="color-swatch">
            </div>
          </div>

          <!-- Stroke -->
          <div class="control-group">
            <label class="control-label">
              <input type="checkbox" id="strokeToggle" class="form-check-input" checked> Stroke
            </label>
            <div class="color-picker-wrap" id="strokeWrap">
              <input type="text" id="strokeHex" class="hex-input" value="#222222" maxlength="7">
              <input type="color" id="strokeColor" value="#222222" class="color-swatch">
            </div>
          </div>

          <!-- Stroke Size -->
          <div class="control-group stroke-size-group" id="strokeSizeGroup">
            <label class="control-label">Size: <span id="strokeSizeVal">3</span>px</label>
            <input type="range" id="strokeSize" min="0.5" max="10" value="3" step="0.5" class="form-range stroke-range">
          </div>

          <!-- Background -->
          <div class="control-group">
            <label class="control-label">
              <input type="checkbox" id="bgToggle" class="form-check-input"> Background
            </label>
            <div class="color-picker-wrap" id="bgWrap">
              <input type="text" id="bgHex" class="hex-input" value="#ffffff" maxlength="7" disabled>
              <input type="color" id="bgColor" value="#ffffff" class="color-swatch" disabled>
            </div>
          </div>
        </div>
      </div>
    </div>
  </section>

  <!-- Grid of SVG Cards -->
  <main class="main-content">
    <div class="container">
      <div class="row g-3" id="stateGrid">
        <!-- Cards injected by JS -->
      </div>
      <div class="no-results" id="noResults" style="display:none;">
        <svg viewBox="0 0 80 80" fill="none" stroke="currentColor" stroke-width="2" class="no-results-icon">
          <circle cx="35" cy="35" r="24"/>
          <line x1="52" y1="52" x2="70" y2="70"/>
        </svg>
        <p>No states found</p>
      </div>
    </div>
  </main>

  <!-- Download Modal -->
  <div class="modal fade" id="downloadModal" tabindex="-1">
    <div class="modal-dialog modal-dialog-centered modal-lg">
      <div class="modal-content custom-modal">
        <div class="modal-header">
          <h5 class="modal-title" id="modalTitle">Download SVG</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body">
          <div class="modal-preview" id="modalPreview"></div>

          <!-- Size selector -->
          <label class="modal-section-label">Size</label>
          <div class="size-buttons">

          <!-- Format selector is below -->
            <button class="size-btn" data-size="sm">
              <span class="size-label">Small</span>
            </button>
            <button class="size-btn" data-size="md">
              <span class="size-label">Medium</span>
            </button>
            <button class="size-btn active" data-size="lg">
              <span class="size-label">Large</span>
            </button>
          </div>

          <!-- Format selector -->
          <label class="modal-section-label">File Type</label>
          <div class="format-buttons">
            <button class="format-btn active" data-format="svg">SVG</button>
            <button class="format-btn" data-format="png">PNG</button>
            <button class="format-btn" data-format="jpg">JPG</button>
          </div>

          <!-- Actions -->
          <div class="modal-actions">
            <button class="btn-action btn-download" id="btnDownload">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><path d="M10 3v10m0 0l-4-4m4 4l4-4M3 17h14"/></svg>
              Download
            </button>
            <button class="btn-action btn-copy" id="btnCopy">
              <svg viewBox="0 0 20 20" fill="none" stroke="currentColor" stroke-width="2" width="18" height="18"><rect x="6" y="6" width="11" height="11" rx="2"/><path d="M6 14H5a2 2 0 01-2-2V5a2 2 0 012-2h7a2 2 0 012 2v1"/></svg>
              Copy SVG Code
            </button>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Hidden canvas for PNG/JPG export -->
  <canvas id="exportCanvas" width="800" height="800" style="display:none;"></canvas>

  <!-- Notification Box -->
  <div class="notification-box notification-hidden d-none" id="notificationBox">
    <button class="notification-close" id="notificationClose" title="Close">
      <svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="2" width="14" height="14"><path d="M4 4l8 8M12 4l-8 8"/></svg>
    </button>
    <div class="notification-inner">
      <div class="notification-image">
        <svg viewBox="0 0 48 48" fill="none" xmlns="http://www.w3.org/2000/svg" width="48" height="48">
          <rect width="48" height="48" rx="10" fill="var(--color-bg-muted)"/>
          <path d="M14 24l4-6h12l4 6-4 6H18z" fill="var(--color-brand)" opacity="0.7"/>
          <path d="M18 20l2-3h8l2 3-2 3h-8z" fill="var(--color-brand)"/>
        </svg>
      </div>
      <div class="notification-content">
        <p style="font-size: 20px; font-weight: semibold; line-height: 25px;">Saved you a<br>minute?</p>
        <a href="#" class="notification-btn">Tip me coffee</a>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script src="app.js"></script>
</body>
</html>
